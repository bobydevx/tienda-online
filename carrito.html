<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    NovaShop
  </title>

  <link 
    rel="stylesheet" 
    href="css/style.css"
  >

</head>

<body>

      <!-- ========================================
  NAVBAR
  ========================================= -->

  <nav>

    <div class="nav-container">

      <!-- LOGO -->

      <a class="logo">

        Mini<span>Shop</span>

      </a>


      <!-- BOTONES NAV -->

      <div class="nav-actions">

        <!-- TODO:
        Abrir modal login
        -->

        <button id="account-btn" class="nav-btn" hidden>

          Mi cuenta

        </button>

        <button id="login-btn" class="nav-btn">
          👤
        </button>

        <button id="logout-btn" class="nav-btn">
          Cerrar Sesión
        </button>

      </div>

    </div>

  </nav>

  <div class="container">

    <h1>
      NovaShop
    </h1>

    <!-- FILTROS -->

    <section class="controls">

      <input
        type="text"
        id="searchInput"
        placeholder="Buscar producto..."
      >

      <select id="categoryFilter">

        <option value="all">
          Todas las categorías
        </option>

      </select>

      <select id="sortSelect">

        <option value="default">
          Ordenar por
        </option>

        <option value="priceAsc">
          Precio ↑
        </option>

        <option value="priceDesc">
          Precio ↓
        </option>

      </select>

    </section>

    <!-- MAIN -->

    <main class="main-layout">

      <!-- PRODUCTOS -->

      <section
        class="products-grid"
        id="productsContainer"
      >

      </section>

      <!-- CARRITO -->

      <aside class="cart-panel">

        <h2>
          Carrito
        </h2>

        <div id="cartContainer">

        </div>

        <div class="cart-total">

          <span>Total</span>

          <span id="cartTotal">
            0€
          </span>

        </div>

        <button
          class="checkout-btn"
          id="checkoutBtn"
        >
          Finalizar compra
        </button>

      </aside>

    </main>

    <!-- CHECKOUT -->

    <section class="checkout">

      <h2>
        Datos de envío
      </h2>

      <form id="checkoutForm">

        <div class="form-grid">

          <div class="input-group">

            <label>
              Nombre
            </label>

            <input
              type="text"
              id="nameInput"
            >

          </div>

          <div class="input-group">

            <label>
              Apellidos
            </label>

            <input
              type="text"
              id="lastnameInput"
            >

          </div>

          <div class="input-group full">

            <label>
              Dirección
            </label>

            <input
              type="text"
              id="addressInput"
            >

          </div>

          <div class="input-group">

            <label>
              Ciudad
            </label>

            <input
              type="text"
              id="cityInput"
            >

          </div>

          <div class="input-group">

            <label>
              Código postal
            </label>

            <input
              type="text"
              id="postalInput"
            >

          </div>

          <div class="input-group">

            <label>
              Teléfono
            </label>

            <input
              type="text"
              id="phoneInput"
            >

          </div>

          <div class="input-group">

            <label>
              Email
            </label>

            <input
              type="email"
              id="emailInput"
            >

          </div>

        </div>

        <button
          type="button"
          class="buy-btn"
          id="buyBtn"
        >
          Comprar ahora
        </button>

      </form>

      <div
        class="success-message"
        id="successMessage"
      >
        Compra realizada correctamente
      </div>

    </section>

  </div>

  <script src="main.js"></script>

</body>

</html>
